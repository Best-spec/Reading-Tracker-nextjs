<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ReadFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .input-group:focus-within label { color: #667eea; }
    </style>
</head>
<body class="auth-bg flex items-center justify-center h-screen overflow-hidden">
    <div class="p-6 flex flex-col md:flex-row items-center justify-center gap-20 w-full max-w-5xl">

        <div class="hidden md:flex flex-col items-center text-center">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 rounded-3xl mb-6 shadow-xl">
                <i data-lucide="book-open" class="w-10 h-10 text-white"></i>
            </div>
            <h1 class="text-4xl font-bold text-white tracking-tight">ReadFlow</h1>
            <p class="text-white/80 mt-2 text-lg">Social Reading Tracker</p>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-[350px]">
            <h2 class="text-sm font-bold text-gray-800 mb-1 text-center">Welcome Back</h2>
            <p class="text-xs text-gray-500 mb-2 text-center tracking-wide">Social Reading Tracker</p>

            <form id="login-form" class="space-y-2"> <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Email or Username</label>
                    <input type="text" id="email" class="text-xs w-full px-4 py-2 rounded-xl border border-gray-100" autocomplete="username">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Password</label>
                    <input type="password" id="password" class="text-xs w-full px-4 py-2 rounded-xl border border-gray-100" autocomplete="current-password">
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 text-xs text-gray-600">
                        <input type="checkbox" class="rounded border-gray-300">
                        Remember me
                    </label>
                    <a href="#" id="toggle-password" class="text-xs text-indigo-600 hover:underline">Forgot password?</a>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2.5 rounded-xl shadow-md ...">
                    Sign In
                </button>
            </form>

            <div class="relative my-2 text-center">
                <span class="bg-white px-2 text-xs text-gray-400 relative z-10 uppercase">Or</span>
                <div class="absolute inset-y-1/2 w-full border-t border-gray-50"></div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button type="button" class="py-2 border border-gray-100 rounded-xl text-xs font-medium ...">Google</button>
                <button type="button" class="py-2 border border-gray-100 rounded-xl text-xs font-medium ...">Facebook</button>
            </div>

            <div class="mt-2 text-center">
                <p class="text-xs text-gray-500">Don't have an account? <a href="#" class="text-indigo-600 hover:underline">Sign up</a></p>
            </div>
        </div>
    </div>

    <script src="../services/api.js"></script>
    <script src="../pages/Login.js"></script>
    <script>
        lucide.createIcons();
        
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        });
    </script>

</body>
</html>
