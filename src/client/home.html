<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reading Tracker</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h1>Reading Tracker</h1>
        <hr>

        <button onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('library')">Library</button>
        <button onclick="showPage('calendar')">Calendar</button>
        <button onclick="showPage('timer')">Timer</button>
        <button onclick="showPage('friends')">Friends</button>
    </div>


    <div class="right">

        <div id="dashboard" class="page">
            <h2>Dashboard</h2>
            <p>สถิติการอ่านของคุณ</p>
        </div>

        <div id="library" class="page">
            <h2>Library</h2>
            <p>รายการหนังสือของคุณ</p>
        </div>

        <div id="calendar" class="page">
            <h2>Calendar</h2>
            <p>ตารางการอ่าน</p>
        </div>

        <div id="timer" class="page">
            <h2>Timer</h2>
            <p>ตัวจับเวลาอ่านหนังสือ</p>
        </div>

        <div id="friends" class="page">
            <h2>Friends</h2>
            <p>เพื่อนที่กำลังอ่านหนังสือ</p>
        </div>

    </div>

</div>

<script src="b.js"></script>
<script src="home.js"></script>

</body>
</html>
