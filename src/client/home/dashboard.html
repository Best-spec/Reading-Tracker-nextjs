<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadFlow - Dashboard</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="logo-icon"><i data-lucide="book-open"></i></div>
                <span class="logo-text">ReadFlow</span>
            </div>
            <nav id="nav-menu" class="nav-menu">
                <button type="button" class="nav-item active" onclick="location.href='dashboard.html'">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </button>
                <button type="button" class="nav-item" onclick="location.href='books.html'">
                    <i data-lucide="library"></i>
                    <span>My Books</span>
                </button>
                <button type="button" class="nav-item" onclick="location.href='profile.html'">
                    <i data-lucide="user"></i>
                    <span>Profile</span>
                </button>
                <button type="button" class="nav-item" onclick="location.href='settings.html'">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </button>
            </nav>
            <div class="status-badge">
                <div id="online-status" class="online-pill"></div>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header class="header">
                <div>
                    <h2>ยินดีต้อนรับกลับมา, วัยรุ่น! 👋</h2>
                    <div class="ai-insight">
                        <i data-lucide="sparkles" class="icon-ai"></i>
                        <span id="daily-insight">กำลังโหลดแรงบันดาลใจ...</span>
                    </div>
                </div>
            </header>

            <section class="stats-grid" id="stats-grid"></section>

            <div class="dashboard-grid">
                <!-- CHART -->
                <section class="section-card">
                    <div class="section-header">
                        <div class="section-title">
                            <i data-lucide="trending-up" class="icon-primary"></i>
                            แนวโน้มการอ่านรายสัปดาห์
                        </div>
                    </div>
                    <div class="chart-container" id="chart-container"></div>
                </section>

                <!-- BOOKS -->
                <section class="section-card">
                    <div class="section-header">
                        <div class="section-title">
                            <i data-lucide="book-marked" class="icon-primary"></i>
                            กำลังอ่านอยู่
                        </div>
                        <button type="button" onclick="handleRecommend()" class="btn btn-ai">✨ AI แนะนำ</button>
                    </div>
                    <div class="book-list" id="books-list"></div>
                    <button type="button" class="btn btn-primary btn-continue">
                        <i data-lucide="book-open" class="icon-sm"></i>
                        หยิบมาอ่านต่อสิ
                    </button>
                </section>
            </div>
        </main>
    </div>

    <!-- AI MODAL -->
    <div id="ai-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title" class="modal-title-ai">
                    <i data-lucide="sparkles"></i> AI สรุปผล
                </h3>
                <button type="button" onclick="closeModal()" class="btn-close" aria-label="ปิด"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body" id="modal-content"></div>
        </div>
    </div>

    <script src="api.js" defer></script>
    <script src="dashboard.js" defer></script>
</body>
</html>
